steps:
  # Build and push Docker image with Kaniko (with layer caching)
  # VITE_GOOGLE_CLIENT_ID and VITE_JUSSI_AIBOT_API_KEY are injected from Secret Manager via secretEnv.
  # Note: 'debug' tag is required — it includes busybox shell needed for secretEnv expansion.
  - name: 'gcr.io/kaniko-project/executor:debug'
    entrypoint: '/busybox/sh'
    args:
      - '-c'
      - |
        /kaniko/executor \
          --dockerfile=Dockerfile \
          --context=dir:///workspace \
          --destination=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/jussimatic-frontend/jussimatic-frontend:$TAG_NAME \
          --destination=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/jussimatic-frontend/jussimatic-frontend:latest \
          --cache=true \
          --cache-ttl=336h \
          --cache-repo=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/jussimatic-frontend/cache \
          --build-arg=VITE_JUSSIMATIC_BACKEND_API_BASE_URL=$_VITE_JUSSIMATIC_BACKEND_API_BASE_URL \
          --build-arg=VITE_JUSSILOG_BACKEND_API_BASE_URL=$_VITE_JUSSILOG_BACKEND_API_BASE_URL \
          --build-arg=VITE_JUSSILOG_BACKEND_STORAGE_BASE_URL=$_VITE_JUSSILOG_BACKEND_STORAGE_BASE_URL \
          --build-arg=VITE_JUSSI_AIBOT_API_URL=$_VITE_JUSSI_AIBOT_API_URL \
          --build-arg=VITE_JUSSI_AIBOT_API_KEY=$$VITE_JUSSI_AIBOT_API_KEY \
          --build-arg=VITE_GOOGLE_CLIENT_ID=$$VITE_GOOGLE_CLIENT_ID \
          --build-arg=VITE_APP_TITLE=$_VITE_APP_TITLE \
          --build-arg=VITE_APP_DESCRIPTION=$_VITE_APP_DESCRIPTION \
          --build-arg="VITE_CV_ENDPOINT=$_VITE_CV_ENDPOINT"
    secretEnv:
      - 'VITE_GOOGLE_CLIENT_ID'
      - 'VITE_JUSSI_AIBOT_API_KEY'

  # Deploy to Cloud Run — also stamps the build-time URL vars onto the revision
  # so they are visible via `gcloud run services describe` / get-cloud-run-env.sh
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jussimatic-frontend-production'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/jussimatic-frontend/jussimatic-frontend:$TAG_NAME'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - >-
        VITE_JUSSIMATIC_BACKEND_API_BASE_URL=$_VITE_JUSSIMATIC_BACKEND_API_BASE_URL,
        VITE_JUSSILOG_BACKEND_API_BASE_URL=$_VITE_JUSSILOG_BACKEND_API_BASE_URL,
        VITE_JUSSILOG_BACKEND_STORAGE_BASE_URL=$_VITE_JUSSILOG_BACKEND_STORAGE_BASE_URL,
        VITE_JUSSI_AIBOT_API_URL=$_VITE_JUSSI_AIBOT_API_URL,
        VITE_CV_ENDPOINT=$_VITE_CV_ENDPOINT

options:
  machineType: E2_MEDIUM
  diskSizeGb: 20
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-north1
  _PROJECT_ID: client-jussimatic
  _VITE_JUSSIMATIC_BACKEND_API_BASE_URL: ''
  _VITE_JUSSILOG_BACKEND_API_BASE_URL: ''
  _VITE_JUSSILOG_BACKEND_STORAGE_BASE_URL: ''
  _VITE_JUSSI_AIBOT_API_URL: ''
  _VITE_APP_TITLE: ''
  _VITE_APP_DESCRIPTION: ''
  _VITE_CV_ENDPOINT: ''

# Secrets injected from Secret Manager at build time
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/JUSSIMATIC_FRONTEND_VITE_GOOGLE_CLIENT_ID/versions/latest
      env: 'VITE_GOOGLE_CLIENT_ID'
    - versionName: projects/$PROJECT_ID/secrets/JUSSIMATIC_FRONTEND_VITE_JUSSI_AIBOT_API_KEY/versions/latest
      env: 'VITE_JUSSI_AIBOT_API_KEY'

timeout: '300s'
