steps:
  # Build and push Docker image with Kaniko (with layer caching)
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=Dockerfile'
      - '--context=dir:///workspace'
      - '--destination=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/jussimatic-frontend/jussimatic-frontend:$TAG_NAME'
      - '--destination=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/jussimatic-frontend/jussimatic-frontend:latest'
      - '--cache=true'
      - '--cache-ttl=336h'
      - '--cache-repo=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/jussimatic-frontend/cache'
      - '--build-arg=VITE_JUSSIMATIC_BACKEND_API_BASE_URL=$_VITE_JUSSIMATIC_BACKEND_API_BASE_URL'
      - '--build-arg=VITE_JUSSILOG_BACKEND_API_BASE_URL=$_VITE_JUSSILOG_BACKEND_API_BASE_URL'
      - '--build-arg=VITE_JUSSILOG_BACKEND_STORAGE_BASE_URL=$_VITE_JUSSILOG_BACKEND_STORAGE_BASE_URL'
      - '--build-arg=VITE_JUSSI_AIBOT_API_URL=$_VITE_JUSSI_AIBOT_API_URL'
      - '--build-arg=VITE_JUSSI_AIBOT_API_KEY=$_VITE_JUSSI_AIBOT_API_KEY'
      - '--build-arg=VITE_GOOGLE_CLIENT_ID=$_VITE_GOOGLE_CLIENT_ID'
      - '--build-arg=VITE_APP_TITLE=$_VITE_APP_TITLE'
      - '--build-arg=VITE_APP_DESCRIPTION=$_VITE_APP_DESCRIPTION'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jussimatic-frontend-production'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/jussimatic-frontend/jussimatic-frontend:$TAG_NAME'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

options:
  machineType: E2_MEDIUM
  diskSizeGb: 20
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-north1
  _PROJECT_ID: client-jussimatic
  _VITE_JUSSIMATIC_BACKEND_API_BASE_URL: ''
  _VITE_JUSSILOG_BACKEND_API_BASE_URL: ''
  _VITE_JUSSILOG_BACKEND_STORAGE_BASE_URL: ''
  _VITE_JUSSI_AIBOT_API_URL: ''
  _VITE_JUSSI_AIBOT_API_KEY: ''
  _VITE_GOOGLE_CLIENT_ID: ''
  _VITE_APP_TITLE: ''
  _VITE_APP_DESCRIPTION: ''

timeout: '300s'
