steps:
  # Build and push Docker image with Kaniko (with layer caching)
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=Dockerfile'
      - '--context=dir:///workspace'
      - '--destination=europe-north1-docker.pkg.dev/client-jussimatic/jussimatic-frontend/jussimatic-frontend:$TAG_NAME'
      - '--destination=europe-north1-docker.pkg.dev/client-jussimatic/jussimatic-frontend/jussimatic-frontend:latest'
      - '--cache=true'
      - '--cache-ttl=336h'
      - '--cache-repo=europe-north1-docker.pkg.dev/client-jussimatic/jussimatic-frontend/cache'
      - '--build-arg=VITE_JUSSIMATIC_BACKEND_API_BASE_URL=$_VITE_JUSSIMATIC_BACKEND_API_BASE_URL'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jussimatic-frontend-production'
      - '--image'
      - 'europe-north1-docker.pkg.dev/client-jussimatic/jussimatic-frontend/jussimatic-frontend:$TAG_NAME'
      - '--region'
      - 'europe-north1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

substitutions:
  _VITE_JUSSIMATIC_BACKEND_API_BASE_URL: 'https://jussimatic-node-server-61766311353.europe-north1.run.app/'

options:
  machineType: E2_MEDIUM
  diskSizeGb: 20
  logging: CLOUD_LOGGING_ONLY

timeout: '300s'
